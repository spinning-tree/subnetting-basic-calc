<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Calc Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#f1f3f6] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const App = () => {
            const [ip, setIp] = useState('192.168.1.1');
            const [cidr, setCidr] = useState('24');
            const [mask, setMask] = useState('255.255.255.0');
            const [neededHosts, setNeededHosts] = useState('254');
            const [subnets, setSubnets] = useState('1');
            const [results, setResults] = useState(null);

            const ipToLong = (ipStr) => {
                const parts = ipStr.split('.');
                if (parts.length !== 4) return 0;
                return parts.reduce((acc, octet) => (acc << 8) + (parseInt(octet, 10) || 0), 0) >>> 0;
            };

            const longToIp = (long) => [
                (long >>> 24) & 255, (long >>> 16) & 255, (long >>> 8) & 255, long & 255
            ].join('.');

            const cidrToMask = (prefix) => {
                let m = prefix === 0 ? 0 : (~0 << (32 - prefix)) >>> 0;
                return longToIp(m);
            };

            const getDefaultCidr = (ipStr) => {
                const octet = parseInt(ipStr.split('.')[0]);
                if (octet < 128) return 8;
                if (octet < 192) return 16;
                return 24;
            };

            const calculate = useCallback(() => {
                const cleanIp = ip.trim();
                if (!/^(\d{1,3}\.){3}\d{1,3}$/.test(cleanIp)) return;
                
                const prefix = Math.min(Math.max(parseInt(cidr) || 0, 0), 32);
                const ipLong = ipToLong(cleanIp);
                const maskLong = ipToLong(cidrToMask(prefix));
                const networkLong = (ipLong & maskLong) >>> 0;
                const broadcastLong = (networkLong | (~maskLong)) >>> 0;
                const totalHosts = Math.pow(2, 32 - prefix);
                const usableHosts = prefix <= 30 ? totalHosts - 2 : (prefix === 31 ? 2 : 1);
                const base = getDefaultCidr(cleanIp);
                
                setResults({
                    net: longToIp(networkLong),
                    broad: longToIp(broadcastLong),
                    first: usableHosts > 0 ? longToIp(networkLong + 1) : longToIp(networkLong),
                    last: usableHosts > 0 ? longToIp(broadcastLong - 1) : longToIp(broadcastLong),
                    usable: Math.max(0, usableHosts).toLocaleString(),
                    bin: maskLong.toString(2).padStart(32, '0').match(/.{8}/g).join('.'),
                    wild: longToIp(~maskLong >>> 0)
                });

                if (document.activeElement?.name !== 'sub_in') {
                    setSubnets(prefix >= base ? Math.pow(2, prefix - base).toString() : '1');
                }
            }, [ip, cidr]);

            useEffect(() => { calculate(); }, [calculate]);

            const changeCidr = (v) => {
                const n = parseInt(v);
                setCidr(v);
                if (!isNaN(n) && n >= 0 && n <= 32) {
                    setMask(cidrToMask(n));
                    setNeededHosts(Math.max(0, Math.pow(2, 32 - n) - 2).toString());
                }
            };

            const changeSubs = (v) => {
                setSubnets(v);
                const s = parseInt(v);
                if (!isNaN(s) && s > 0) {
                    const prefix = Math.min(getDefaultCidr(ip) + Math.ceil(Math.log2(s)), 32);
                    setCidr(prefix.toString());
                    setMask(cidrToMask(prefix));
                    setNeededHosts(Math.max(0, Math.pow(2, 32 - prefix) - 2).toString());
                }
            };

            const changeHosts = (v) => {
                setNeededHosts(v);
                const h = parseInt(v);
                if (!isNaN(h) && h >= 0) {
                    const prefix = Math.max(32 - (h === 0 ? 0 : Math.ceil(Math.log2(h + 2))), 0);
                    setCidr(prefix.toString());
                    setMask(cidrToMask(prefix));
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">
                    <header className="mb-12 flex items-center gap-6">
                        <div className="bg-indigo-600 p-4 rounded-3xl text-white shadow-2xl shadow-indigo-200">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>
                        </div>
                        <div>
                            <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Subnet Calc Pro</h1>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="w-2 h-2 bg-green-500 rounded-full"></span>
                                <p className="text-slate-500 font-bold text-xs uppercase tracking-widest">Calculadora de Subredes y Hosts</p>
                            </div>
                        </div>
                    </header>

                    <div className="space-y-8">
                        {/* Panel de Control */}
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
                            {[ 
                                {l: 'Dirección IP', v: ip, f: setIp, n: 'ip'},
                                {l: 'Prefijo (CIDR)', v: cidr, f: changeCidr, n: 'cidr', t: 'number'},
                                {l: 'Subredes', v: subnets, f: changeSubs, n: 'sub_in', t: 'number', c: 'bg-indigo-50 border-indigo-100 text-indigo-700 font-bold'},
                                {l: 'Hosts', v: neededHosts, f: changeHosts, n: 'hosts', t: 'number'},
                                {l: 'Máscara', v: mask, r: true}
                            ].map(i => (
                                <div key={i.l} className="flex flex-col gap-2">
                                    <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">{i.l}</label>
                                    <input 
                                        name={i.n} type={i.t || 'text'} value={i.v} readOnly={i.r}
                                        onChange={e => i.f && i.f(e.target.value)}
                                        className={`w-full px-5 py-4 rounded-2xl font-mono text-sm outline-none border transition-all ${i.r ? 'bg-slate-100 border-transparent text-slate-500 cursor-default' : (i.c || 'bg-white border-slate-200 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50')}`}
                                    />
                                </div>
                            ))}
                        </div>

                        {results && (
                            <div className="grid lg:grid-cols-12 gap-8 items-start">
                                {/* Columna Izquierda: Red */}
                                <div className="lg:col-span-7 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 space-y-6">
                                    <h3 className="font-extrabold text-slate-800 text-sm uppercase tracking-widest border-b border-slate-100 pb-4">Límites de Red</h3>
                                    <div className="grid gap-4">
                                        {[
                                            {l: 'Network ID', v: results.net, icon: '🌐'},
                                            {l: 'Broadcast IP', v: results.broad, icon: '📢'},
                                            {l: 'Rango Utilizable', v: `${results.first} — ${results.last}`, icon: '↔️'}
                                        ].map(i => (
                                            <div key={i.l} className="p-6 bg-slate-50 rounded-3xl border border-slate-100 flex justify-between items-center group transition-all hover:bg-white hover:border-indigo-200 hover:shadow-md">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-xl">{i.icon}</span>
                                                    <div>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{i.l}</p>
                                                        <p className="font-mono font-bold text-slate-900 text-lg">{i.v}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Columna Derecha: Métricas */}
                                <div className="lg:col-span-5 space-y-6">
                                    {/* Hosts Card */}
                                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-100 relative overflow-hidden">
                                        <div className="relative z-10">
                                            <p className="text-xs font-bold opacity-80 uppercase tracking-widest mb-2">Total de Hosts Útiles</p>
                                            <p className="text-5xl font-black tracking-tighter mb-2">{results.usable}</p>
                                            <div className="inline-block px-3 py-1 bg-white/20 rounded-full text-[10px] font-bold uppercase">Capacidad Neta</div>
                                        </div>
                                        <div className="absolute -right-8 -bottom-8 opacity-10 transform rotate-12">
                                            <svg width="160" height="160" viewBox="0 0 24 24" fill="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                        </div>
                                    </div>

                                    {/* Binary & Wildcard Card */}
                                    <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white space-y-8 shadow-2xl shadow-slate-200">
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[10px] font-bold opacity-50 uppercase tracking-widest">Máscara Binaria</span>
                                                <span className="text-[10px] font-bold text-indigo-400 uppercase">32 Bits</span>
                                            </div>
                                            <div className="font-mono text-xs p-5 bg-white/5 rounded-2xl border border-white/10 flex justify-center text-center items-center leading-relaxed text-indigo-300 break-all select-all tracking-wider">
                                                {results.bin}
                                            </div>
                                        </div>
                                        
                                        <div className="pt-6 border-t border-white/5 flex justify-between items-center">
                                            <div>
                                                <p className="text-[10px] font-bold opacity-50 uppercase tracking-widest mb-1">Wildcard Mask</p>
                                                <p className="font-mono font-bold text-xl text-indigo-100">{results.wild}</p>
                                            </div>
                                            <div className="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl">
                                                🃏
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <footer className="mt-16 text-center space-y-2">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">SPINNINGTREE</p>
                        <p className="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Released under MIT License</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
